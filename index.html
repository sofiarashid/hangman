<!doctype html>
<html lang="en">
    
<head>
    <title>Hangman</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container d-flex justify-content-center mt-4">


        <div class="card p-4 shadow text-center hangman-card">
            <h1 class="card-title mb-4">Hangman</h1>
         
         
            <div id="difficultySection" class="row mb-4 text-center">
                <h2 class="mb-3">Select Difficulty</h2>
                <div class="col-md-4">
                    <button id="easyBtn" class="btn btn-success w-100">Easy</button>
                </div>
                <div class="col-md-4">
                    <button id="mediumBtn" class="btn btn-warning w-100">Medium</button>
                </div>
                <div class="col-md-4">
                    <button id="hardBtn" class="btn btn-danger w-100">Hard</button>
                </div>
            </div>


            <div class="mb-4">
                <img src="hangman1.png" class="img-fluid" width="200">
            </div>
          
          
            <h2 id="wordDisplay" class="mb-4">_ _ _ _ _ _ _ _ _ _</h2>
            
            
            <!--Buttons-->
            <div class="container">
                <div class="row g-2">
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('A')">A</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('B')">B</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('C')">C</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('D')">D</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('E')">E</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('F')">F</button>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('G')">G</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('H')">H</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('I')">I</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('J')">J</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('K')">K</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('L')">L</button>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('M')">M</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('N')">N</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('O')">O</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('P')">P</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('Q')">Q</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('R')">R</button>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('S')">S</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('T')">T</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('U')">U</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('V')">V</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('W')">W</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('X')">X</button>
                    </div>
                </div>
                <div class="row g-2 justify-content-center">
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('Y')">Y</button>
                    </div>
                    <div class="col-2">
                        <button class="btn btn-light w-100 buttonsdiv" onclick="pressLetter('Z')">Z</button>
                    </div>
                </div>
            </div>



            <div class="container usedletters">
                <p>Used Letters:</p>
                <p id="usedLetters"></p>
            </div>



            <p class="mt-2">Wrong Guesses: <span id="wrongGuesses">0</span></p>

            <button class="btn btn-dark mt-3" id="resetBtn">New Game</button>

        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
