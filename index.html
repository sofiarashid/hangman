<!doctype html>
<html lang="en">
    <head>
        <title>Hangman</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header></header>
        <main>
            <div class="card m-2 p-2">
                <h1 class="card-title text-center">Hangman</h1>
                <div class="row justify-content-d-flex">
                    <div class="row mb-4">
                        <div class="col-4">
                            <button id="easyBtn" class="btn btn-success w-100">Easy</button>
                        </div>
                    
                        <div class="col-4">
                            <button id="mediumBtn" class="btn btn-warning w-100">Medium</button>
                        </div>
                    
                        <div class="col-4">
                            <button id="hardBtn" class="btn btn-danger w-100">Hard</button>
                        </div>
                    </div>
                </div>



                <div class="row mb-3">
                    <div class="col">
                        <h3 id="wordDisplay">_ _ _ _ _ _ _ _ _ _</h3>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <p>Guessed Letters:</p>
                        <div id="guessedLetters"></div>
                    </div>
                </div>

                <!---->
                <div class="row justify-content-center mb-4">
                    <div class="col-10">
                        <div id="keyboard" class="d-flex flex-wrap gap-2 justify-content-center">
                        </div>
                    </div>
                </div>

                <!-- reset button -->
                <div class="row">
                    <div class="col">
                        <button id="resetBtn" class="btn btn-primary">New Game</button>
                    </div>
                </div>
            </div>
        </main>

        <footer></footer>
        <script src="script.js"></script>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
