<!doctype html>
<html lang="en">
    <head>
        <title>Hangman</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header></header>
        <main>
            <div class="card m-2 p-2">
                <h1 class="card-title text-center">Hangman</h1>
                <div class="row justify-content-d-flex">
                    <div id="difficultySection" class="row mb-4">
                        <h2>Select Difficulty</h2>
                        <div class="col-4">
                            <button id="easyBtn" class="btn btn-success w-100 m-2">Easy</button>
                        </div>
                    
                        <div class="col-4">
                            <button id="mediumBtn" class="btn btn-warning w-100 m-2">Medium</button>
                        </div>
                    
                        <div class="col-4">
                            <button id="hardBtn" class="btn btn-danger w-100 m-2">Hard</button>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <img id="health" src="health1.png" class="img-fluid" width="200">
                </div>

                
                <h2 id="wordDisplay" class="mb-4">_ _ _ _ _ _ _ _ _ _</h2>
                
                <div class="input-group mb-3 w-50 mx-auto">
                    <input type="text" id="guessInput" class="form-control" maxlength="1" placeholder="Enter a letter" disabled>
                    <button id="guessBtn" class="btn btn-primary">Guess</button>
                </div>

                <p id="message" class="text-center"></p>

                <div class="mt-4">
                    <h5>Used Letters:</h5>
                    <p id="usedLetters"></p>
                </div>

                <div class="mt-3">
                    <p>Wrong Guesses: <span id="wrongGuesses">0</span></p>
                </div>

                <button class="btn btn-dark mt-4" id="resetBtn">New Game</button>
            </div>
        </main>

        <footer></footer>
        <script src="script.js"></script>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
